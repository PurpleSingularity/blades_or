<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Blades in the Dark — Owlbear Rodeo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Special+Elite&display=swap" rel="stylesheet">

  <style>
    /* ─── tokens ───────────────────────────────────────────── */
    :root {
      --bg-0:        #0e0b08;        /* sooty black, warm */
      --bg-1:        #161210;        /* surface */
      --bg-2:        #1f1814;        /* raised surface */
      --bg-3:        #2a201a;        /* hover */
      --line:        #3a2d23;        /* tarnished brass line */
      --line-strong: #5a4632;
      --ink:         #e8d9b8;        /* aged parchment */
      --ink-dim:     #a99474;
      --ink-faint:   #6b5a44;

      --brass:       #d4a14a;        /* gaslight amber */
      --brass-dim:   #8a6730;
      --crimson:     #a64147;        /* faded crimson */
      --crimson-dim: #5e2a2c;
      --moss:        #6e8a4e;        /* controlled green */
      --rust:        #b35a2a;        /* risky orange */

      --shadow-deep:  0 2px 0 rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.5);
      --inset:        inset 0 1px 0 rgba(255,235,180,.06), inset 0 -1px 0 rgba(0,0,0,.5);
    }

    /* ─── base ─────────────────────────────────────────────── */
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg-0);
      color: var(--ink);
      font-family: "Crimson Pro", Georgia, serif;
      font-size: 15px;
      line-height: 1.4;
      min-height: 100vh;
      /* paper grain */
      background-image:
        radial-gradient(rgba(212,161,74,.04) 1px, transparent 1px),
        radial-gradient(rgba(166,65,71,.025) 1px, transparent 1px);
      background-size: 3px 3px, 7px 7px;
      background-position: 0 0, 1px 2px;
    }

    h1, h2, h3 { margin: 0; font-family: "Cinzel", serif; letter-spacing: .08em; font-weight: 700; }
    button { font-family: inherit; color: inherit; }

    /* ─── shell ────────────────────────────────────────────── */
    .shell {
      padding: 14px 14px 28px;
      max-width: 380px;
      margin: 0 auto;
    }

    .masthead {
      text-align: center;
      padding: 8px 0 14px;
      border-bottom: 1px solid var(--line);
      position: relative;
    }
    .masthead::after {
      content: "";
      position: absolute; left: 25%; right: 25%; bottom: -3px;
      height: 1px; background: var(--brass-dim); opacity: .5;
    }
    .masthead h1 {
      font-size: 16px;
      color: var(--brass);
      text-transform: uppercase;
    }
    .masthead .sub {
      font-family: "Special Elite", monospace;
      font-size: 10px;
      color: var(--ink-faint);
      letter-spacing: .25em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* ─── section ──────────────────────────────────────────── */
    section { margin-top: 18px; }
    .section-title {
      font-family: "Special Elite", monospace;
      font-size: 11px;
      letter-spacing: .3em;
      color: var(--ink-dim);
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .section-title::before,
    .section-title::after {
      content: ""; flex: 1; height: 1px; background: var(--line);
    }

    /* ─── tabs ─────────────────────────────────────────────── */
    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      margin-bottom: 12px;
    }
    .tab {
      background: var(--bg-1);
      border: 1px solid var(--line);
      color: var(--ink-dim);
      padding: 7px 4px;
      cursor: pointer;
      font-family: "Cinzel", serif;
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
      transition: all .12s ease;
    }
    .tab:hover { background: var(--bg-2); color: var(--ink); }
    .tab.active {
      background: var(--bg-2);
      color: var(--brass);
      border-color: var(--brass-dim);
      box-shadow: var(--inset);
    }

    /* ─── dice picker ──────────────────────────────────────── */
    .row-label {
      font-family: "Special Elite", monospace;
      font-size: 10px;
      color: var(--ink-faint);
      letter-spacing: .25em;
      text-transform: uppercase;
      margin: 8px 0 4px;
    }
    .dice-picker {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .pip {
      background: var(--bg-1);
      border: 1px solid var(--line);
      color: var(--ink-dim);
      padding: 8px 0;
      cursor: pointer;
      font-family: "Cinzel", serif;
      font-weight: 700;
      font-size: 14px;
      transition: all .12s ease;
    }
    .pip:hover { background: var(--bg-3); color: var(--ink); }
    .pip.active {
      background: linear-gradient(180deg, #3a2918 0%, #261a10 100%);
      border-color: var(--brass);
      color: var(--brass);
      box-shadow: 0 0 0 1px var(--brass-dim) inset, 0 0 8px rgba(212,161,74,.2);
    }
    .pip.zero.active { color: var(--crimson); border-color: var(--crimson); box-shadow: 0 0 0 1px var(--crimson-dim) inset; }

    /* ─── selects (position / effect) ──────────────────────── */
    .pe-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }
    .seg {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
      border: 1px solid var(--line);
      background: var(--bg-1);
    }
    .seg button {
      background: transparent;
      border: 0;
      padding: 6px 2px;
      color: var(--ink-faint);
      cursor: pointer;
      font-size: 10px;
      font-family: "Special Elite", monospace;
      letter-spacing: .15em;
      text-transform: uppercase;
      border-right: 1px solid var(--line);
    }
    .seg button:last-child { border-right: 0; }
    .seg button.active {
      background: var(--bg-3);
      color: var(--ink);
    }
    .seg.position button.active[data-v="controlled"] { color: var(--moss); }
    .seg.position button.active[data-v="risky"]      { color: var(--brass); }
    .seg.position button.active[data-v="desperate"]  { color: var(--crimson); }

    /* ─── note input ───────────────────────────────────────── */
    .note {
      width: 100%;
      background: var(--bg-1);
      border: 1px solid var(--line);
      color: var(--ink);
      padding: 7px 9px;
      font-family: "Crimson Pro", serif;
      font-size: 14px;
      margin-top: 8px;
    }
    .note:focus { outline: none; border-color: var(--brass-dim); }

    /* ─── roll button ──────────────────────────────────────── */
    .roll-btn {
      width: 100%;
      margin-top: 12px;
      padding: 13px;
      background: linear-gradient(180deg, #3a2010 0%, #1f1208 100%);
      border: 1px solid var(--brass-dim);
      color: var(--brass);
      font-family: "Cinzel", serif;
      font-weight: 700;
      letter-spacing: .35em;
      text-transform: uppercase;
      font-size: 13px;
      cursor: pointer;
      box-shadow: var(--inset), 0 2px 0 rgba(0,0,0,.4);
      transition: all .1s ease;
    }
    .roll-btn:hover {
      background: linear-gradient(180deg, #4a2c14 0%, #2a180c 100%);
      color: #f3c878;
      box-shadow: var(--inset), 0 2px 0 rgba(0,0,0,.4), 0 0 16px rgba(212,161,74,.15);
    }
    .roll-btn:active { transform: translateY(1px); }

    /* ─── roll display ─────────────────────────────────────── */
    .last-roll {
      margin-top: 14px;
      padding: 12px;
      background: var(--bg-1);
      border: 1px solid var(--line);
      border-left: 3px solid var(--brass-dim);
    }
    .last-roll.empty { display: none; }
    .last-roll.outcome-critical { border-left-color: #f3c878; box-shadow: 0 0 12px rgba(243,200,120,.18); }
    .last-roll.outcome-success  { border-left-color: var(--brass); }
    .last-roll.outcome-partial  { border-left-color: var(--rust); }
    .last-roll.outcome-bad      { border-left-color: var(--crimson); }

    .dice-display {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .die {
      width: 36px; height: 36px;
      background: var(--bg-2);
      border: 1px solid var(--line-strong);
      display: grid;
      grid-template: repeat(3, 1fr) / repeat(3, 1fr);
      padding: 4px;
      gap: 2px;
      position: relative;
    }
    .die .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--ink-faint);
      align-self: center;
      justify-self: center;
    }
    .die.kept { border-color: var(--brass); box-shadow: 0 0 8px rgba(212,161,74,.3) inset, 0 0 4px rgba(212,161,74,.4); }
    .die.kept .dot { background: var(--brass); }
    .die.unused { opacity: .4; }
    .die.six.kept { border-color: #f3c878; }
    .die.six.kept .dot { background: #f3c878; }
    .die.bad.kept .dot { background: var(--crimson); }
    .die.bad.kept { border-color: var(--crimson); }

    .outcome-line {
      font-family: "Cinzel", serif;
      font-size: 14px;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .outcome-critical .outcome-line { color: #f3c878; }
    .outcome-success  .outcome-line { color: var(--brass); }
    .outcome-partial  .outcome-line { color: var(--rust); }
    .outcome-bad      .outcome-line { color: var(--crimson); }

    .roll-meta {
      font-family: "Special Elite", monospace;
      font-size: 10px;
      color: var(--ink-faint);
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-top: 4px;
    }
    .roll-meta .who { color: var(--ink-dim); }

    /* ─── feed ─────────────────────────────────────────────── */
    .feed {
      max-height: 180px;
      overflow-y: auto;
      border: 1px solid var(--line);
      background: var(--bg-1);
      padding: 6px;
    }
    .feed:empty::before {
      content: "—  no rolls yet  —";
      display: block;
      text-align: center;
      color: var(--ink-faint);
      font-family: "Special Elite", monospace;
      font-size: 10px;
      letter-spacing: .2em;
      padding: 12px 0;
    }
    .feed-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 4px;
      border-bottom: 1px dashed var(--line);
      font-size: 13px;
    }
    .feed-item:last-child { border-bottom: 0; }
    .feed-who {
      font-family: "Special Elite", monospace;
      font-size: 10px;
      letter-spacing: .12em;
      flex: 0 0 auto;
      max-width: 88px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .feed-dice { font-family: "Cinzel", serif; color: var(--ink-dim); flex: 0 0 auto; }
    .feed-result { flex: 1; text-align: right; font-size: 11px; font-family: "Cinzel", serif; letter-spacing: .08em; text-transform: uppercase; }
    .feed-result.critical { color: #f3c878; }
    .feed-result.success  { color: var(--brass); }
    .feed-result.partial  { color: var(--rust); }
    .feed-result.bad      { color: var(--crimson); }

    /* scrollbar */
    .feed::-webkit-scrollbar { width: 6px; }
    .feed::-webkit-scrollbar-track { background: transparent; }
    .feed::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }

    /* ─── clocks ───────────────────────────────────────────── */
    .clocks-list { display: grid; gap: 8px; }
    .clock-card {
      display: grid;
      grid-template-columns: 56px 1fr auto;
      gap: 10px;
      align-items: center;
      background: var(--bg-1);
      border: 1px solid var(--line);
      padding: 10px;
    }
    .clock-svg { display: block; }
    .clock-svg path { transition: fill .15s ease; }
    .clock-name {
      font-family: "Crimson Pro", serif;
      font-size: 14px;
      color: var(--ink);
      margin: 0;
      cursor: text;
    }
    .clock-name:focus { outline: 1px solid var(--brass-dim); outline-offset: 2px; }
    .clock-progress {
      font-family: "Special Elite", monospace;
      font-size: 10px;
      letter-spacing: .15em;
      color: var(--ink-faint);
      margin-top: 2px;
    }
    .clock-controls { display: flex; gap: 4px; }
    .clock-btn {
      width: 26px; height: 26px;
      background: var(--bg-2);
      border: 1px solid var(--line);
      color: var(--ink-dim);
      cursor: pointer;
      font-family: "Cinzel", serif;
      font-size: 14px;
      line-height: 1;
      padding: 0;
      transition: all .1s ease;
    }
    .clock-btn:hover { background: var(--bg-3); color: var(--brass); border-color: var(--brass-dim); }
    .clock-btn.danger:hover { color: var(--crimson); border-color: var(--crimson-dim); }

    .new-clock-btn {
      width: 100%;
      padding: 9px;
      background: transparent;
      border: 1px dashed var(--line-strong);
      color: var(--ink-dim);
      cursor: pointer;
      font-family: "Special Elite", monospace;
      font-size: 11px;
      letter-spacing: .25em;
      text-transform: uppercase;
      margin-top: 8px;
      transition: all .12s ease;
    }
    .new-clock-btn:hover { border-color: var(--brass-dim); color: var(--brass); background: var(--bg-1); }

    /* ─── new clock form ───────────────────────────────────── */
    .new-clock-form {
      display: none;
      background: var(--bg-1);
      border: 1px solid var(--line);
      padding: 10px;
      margin-top: 8px;
      gap: 8px;
    }
    .new-clock-form.open { display: grid; }
    .new-clock-form input[type=text] {
      background: var(--bg-2);
      border: 1px solid var(--line);
      color: var(--ink);
      padding: 7px 9px;
      font-family: "Crimson Pro", serif;
      font-size: 14px;
    }
    .new-clock-form input[type=text]:focus { outline: none; border-color: var(--brass-dim); }
    .size-picker { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
    .size-picker button {
      background: var(--bg-2);
      border: 1px solid var(--line);
      color: var(--ink-dim);
      padding: 7px;
      cursor: pointer;
      font-family: "Cinzel", serif;
      font-size: 13px;
    }
    .size-picker button.active { color: var(--brass); border-color: var(--brass-dim); background: var(--bg-3); }
    .form-actions { display: flex; gap: 4px; }
    .form-actions button {
      flex: 1;
      padding: 8px;
      background: transparent;
      border: 1px solid var(--line);
      color: var(--ink-dim);
      cursor: pointer;
      font-family: "Special Elite", monospace;
      font-size: 10px;
      letter-spacing: .25em;
      text-transform: uppercase;
    }
    .form-actions .primary { background: var(--bg-3); color: var(--brass); border-color: var(--brass-dim); }

    /* ─── footer ───────────────────────────────────────────── */
    footer {
      margin-top: 22px;
      text-align: center;
      font-family: "Special Elite", monospace;
      font-size: 9px;
      letter-spacing: .25em;
      color: var(--ink-faint);
      text-transform: uppercase;
    }

    /* offline banner */
    .offline-warn {
      background: var(--crimson-dim);
      color: #fbe6c8;
      padding: 6px 10px;
      font-family: "Special Elite", monospace;
      font-size: 10px;
      letter-spacing: .15em;
      text-align: center;
      margin-bottom: 8px;
    }

    /* small reveal animation on roll */
    @keyframes reveal {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: none; }
    }
    .last-roll:not(.empty) { animation: reveal .25s ease both; }
    @keyframes tumble {
      0%   { transform: rotate(0); }
      50%  { transform: rotate(180deg) scale(.9); }
      100% { transform: rotate(360deg) scale(1); }
    }
    .die.rolling { animation: tumble .35s ease; }
  </style>
</head>
<body>
  <div class="shell">
    <header class="masthead">
      <h1>Blades in the Dark</h1>
      <div class="sub">— a scoundrel's dossier —</div>
    </header>

    <div id="offlineWarn" class="offline-warn" style="display:none">
      Standalone mode — no room sync available
    </div>

    <!-- ─── DICE ─────────────────────────────── -->
    <section>
      <div class="section-title">Roll Dice</div>

      <div class="tabs" id="kindTabs">
        <button class="tab active" data-kind="action">Action</button>
        <button class="tab" data-kind="resistance">Resist</button>
        <button class="tab" data-kind="fortune">Fortune</button>
      </div>

      <div class="row-label">Dice pool</div>
      <div class="dice-picker" id="dicePicker">
        <button class="pip zero" data-d="0">0</button>
        <button class="pip" data-d="1">1</button>
        <button class="pip active" data-d="2">2</button>
        <button class="pip" data-d="3">3</button>
        <button class="pip" data-d="4">4</button>
        <button class="pip" data-d="5">5</button>
        <button class="pip" data-d="6">6</button>
      </div>

      <div id="actionExtras">
        <div class="pe-row">
          <div>
            <div class="row-label">Position</div>
            <div class="seg position" id="positionSeg">
              <button data-v="controlled">Ctrl</button>
              <button class="active" data-v="risky">Risky</button>
              <button data-v="desperate">Desp</button>
            </div>
          </div>
          <div>
            <div class="row-label">Effect</div>
            <div class="seg" id="effectSeg">
              <button data-v="limited">Lim</button>
              <button class="active" data-v="standard">Std</button>
              <button data-v="great">Great</button>
            </div>
          </div>
        </div>
      </div>

      <input class="note" id="note" type="text" placeholder="action / note (e.g. skulk a guard)" maxlength="80" />

      <button class="roll-btn" id="rollBtn">⚄ &nbsp;Roll the dice&nbsp; ⚄</button>

      <div class="last-roll empty" id="lastRoll"></div>

      <div class="row-label" style="margin-top:14px">Recent rolls</div>
      <div class="feed" id="feed"></div>
    </section>

    <!-- ─── CLOCKS ───────────────────────────── -->
    <section>
      <div class="section-title">Progress Clocks</div>
      <div class="clocks-list" id="clocksList"></div>
      <button class="new-clock-btn" id="newClockBtn">+ New clock</button>

      <div class="new-clock-form" id="newClockForm">
        <input type="text" id="newClockName" placeholder="Clock name (e.g. The Heist, Heat, Healing)" maxlength="60" />
        <div class="row-label" style="margin:0">Segments</div>
        <div class="size-picker" id="sizePicker">
          <button data-s="4">4</button>
          <button data-s="6" class="active">6</button>
          <button data-s="8">8</button>
          <button data-s="12">12</button>
        </div>
        <div class="form-actions">
          <button id="cancelClockBtn">Cancel</button>
          <button id="createClockBtn" class="primary">Create</button>
        </div>
      </div>
    </section>

    <footer>v1.0 · for forged in the dark games</footer>
  </div>

  <script type="module">
    /* ────────────────────────────────────────────────────────
       Owlbear Rodeo — Blades in the Dark extension
       Single-file popover. ES module so we can `import` the SDK.
       ──────────────────────────────────────────────────────── */
    let OBR = null;
    let isInOR = false;
    try {
      const mod = await import("https://esm.sh/@owlbear-rodeo/sdk@3.1.0");
      OBR = mod.default;
      isInOR = !!(OBR && OBR.isAvailable);
    } catch (e) {
      console.warn("OBR SDK load failed; running standalone.", e);
    }

    // Namespace for metadata + broadcast keys.  Reverse-DNS per OR convention.
    const NS              = "com.maksym.blades-or";
    const CLOCKS_KEY      = `${NS}/clocks`;
    const DICE_CHANNEL    = `${NS}/dice-roll`;

    // ─── state ──────────────────────────────────────────────
    const state = {
      dice: 2,
      kind: "action",          // action | resistance | fortune
      position: "risky",
      effect: "standard",
      newClockSize: 6,
      clocks: [],              // [{id, name, size, filled}]
      feed: [],                // ephemeral; capped
      me: { name: "You", color: "#d4a14a", role: "PLAYER" }
    };
    const FEED_CAP = 14;

    // ─── tiny helpers ───────────────────────────────────────
    const $  = (s, r=document) => r.querySelector(s);
    const $$ = (s, r=document) => [...r.querySelectorAll(s)];
    const uid = () => Math.random().toString(36).slice(2, 9);

    // ─── dice mechanics (BitD / FitD) ───────────────────────
    function roll(diceCount, kind) {
      const lowest = diceCount === 0;
      const n = lowest ? 2 : diceCount;
      const dice = [];
      for (let i = 0; i < n; i++) dice.push(1 + Math.floor(Math.random() * 6));

      const sixes = dice.filter(d => d === 6).length;
      const pick  = lowest ? Math.min(...dice) : Math.max(...dice);

      // Outcome.  Crit only possible when *not* a 0-die roll.
      let outcome;
      if (!lowest && sixes >= 2) outcome = "critical";
      else if (pick === 6)        outcome = "success";
      else if (pick >= 4)         outcome = "partial";
      else                        outcome = "bad";

      // Resistance: stress = 6 - highest, crit clears 1.
      let stress = null;
      if (kind === "resistance") {
        stress = (outcome === "critical") ? -1 : (6 - pick);
      }

      return { dice, pick, sixes, lowest, outcome, stress };
    }

    // Pick which die to highlight as "kept" — first instance of pick value.
    function keptIndex(rolled) {
      const idx = rolled.dice.indexOf(rolled.pick);
      return idx === -1 ? 0 : idx;
    }

    function outcomeLabel(r, kind) {
      if (kind === "resistance") {
        if (r.stress < 0)  return "Critical — clear 1 stress";
        if (r.stress === 0) return "Take 0 stress";
        return `Take ${r.stress} stress`;
      }
      if (kind === "fortune") {
        if (r.outcome === "critical") return "Exceptional";
        if (r.outcome === "success")  return "Great effect";
        if (r.outcome === "partial")  return "Limited / mixed";
        return "Poor / no effect";
      }
      // action
      if (r.outcome === "critical") return "Critical success";
      if (r.outcome === "success")  return "Full success";
      if (r.outcome === "partial")  return "Partial — consequence";
      return "Bad outcome";
    }

    // ─── d6 face renderer (pip layout) ──────────────────────
    const PIP_LAYOUTS = {
      1: [[1,1]],
      2: [[0,0],[2,2]],
      3: [[0,0],[1,1],[2,2]],
      4: [[0,0],[0,2],[2,0],[2,2]],
      5: [[0,0],[0,2],[1,1],[2,0],[2,2]],
      6: [[0,0],[0,2],[1,0],[1,2],[2,0],[2,2]]
    };
    function dieHTML(value, opts = {}) {
      const positions = PIP_LAYOUTS[value] || [];
      const grid = Array(9).fill('<span></span>');
      for (const [r, c] of positions) grid[r * 3 + c] = '<span class="dot"></span>';
      const cls = ["die"];
      if (opts.kept)   cls.push("kept");
      if (opts.unused) cls.push("unused");
      if (value === 6) cls.push("six");
      if (value <= 3 && opts.kept) cls.push("bad");
      if (opts.rolling) cls.push("rolling");
      return `<div class="${cls.join(' ')}">${grid.join('')}</div>`;
    }

    // ─── rendering: last roll ───────────────────────────────
    function renderLastRoll(payload) {
      const box = $("#lastRoll");
      if (!payload) { box.classList.add("empty"); box.innerHTML = ""; return; }

      const { result, kind, dice, pick, who, color, position, effect, note, lowest } = payload;
      const isCrit = result.outcome === "critical" && !lowest;
      const firstPickIdx = result.dice.indexOf(result.pick);

      const diceHTML = result.dice.map((d, i) => {
        // Crit: every 6 is "kept" so both contributing dice shine.
        // Otherwise: the single die that decides the result.
        const kept   = isCrit ? d === 6 : i === firstPickIdx;
        const unused = !kept && lowest;
        return dieHTML(d, { kept, unused });
      }).join('');

      const meta = [];
      if (kind === "action") {
        if (position) meta.push(position);
        if (effect)   meta.push(`${effect} effect`);
      }
      if (note) meta.push(`"${note}"`);

      box.classList.remove("empty", "outcome-critical", "outcome-success", "outcome-partial", "outcome-bad");
      box.classList.add(`outcome-${result.outcome}`);
      box.innerHTML = `
        <div class="dice-display">${diceHTML}</div>
        <div class="outcome-line">${escapeHtml(outcomeLabel(result, kind))}</div>
        <div class="roll-meta">
          <span class="who" style="color:${color || 'var(--ink-dim)'}">${escapeHtml(who || 'You')}</span>
          · ${kind}${lowest ? ' · 0d (lowest)' : ''}
          ${meta.length ? ' · ' + escapeHtml(meta.join(' · ')) : ''}
        </div>
      `;
    }

    // ─── rendering: feed ────────────────────────────────────
    function renderFeed() {
      const feed = $("#feed");
      feed.innerHTML = state.feed.map(p => {
        const r = p.result;
        const dieList = r.dice.map(d => d).join(' ');
        const label = outcomeLabel(r, p.kind);
        const cls = r.outcome;
        return `
          <div class="feed-item">
            <span class="feed-who" style="color:${p.color || 'var(--ink-dim)'}">${escapeHtml(p.who || '?')}</span>
            <span class="feed-dice">${dieList}</span>
            <span class="feed-result ${cls}">${escapeHtml(label)}</span>
          </div>
        `;
      }).join('');
      feed.scrollTop = 0;
    }
    function pushFeed(payload) {
      state.feed.unshift(payload);
      if (state.feed.length > FEED_CAP) state.feed.length = FEED_CAP;
      renderFeed();
    }

    // ─── do-the-roll wiring ─────────────────────────────────
    async function doRoll() {
      const result = roll(state.dice, state.kind);
      const payload = {
        id: uid(),
        ts: Date.now(),
        who: state.me.name,
        color: state.me.color,
        kind: state.kind,
        dice: state.dice,
        position: state.kind === "action" ? state.position : null,
        effect:   state.kind === "action" ? state.effect   : null,
        note: $("#note").value.trim().slice(0, 80) || null,
        lowest: result.lowest,
        result
      };
      renderLastRoll(payload);
      pushFeed(payload);

      if (isInOR) {
        try {
          // destination "REMOTE" sends to everyone except us — we already rendered locally.
          await OBR.broadcast.sendMessage(DICE_CHANNEL, payload, { destination: "REMOTE" });
        } catch (e) { console.warn("broadcast failed", e); }
      }
    }

    // ─── clocks ─────────────────────────────────────────────
    function clockSVG(filled, size, dim = 56) {
      const r  = dim / 2 - 3;
      const cx = dim / 2, cy = dim / 2;
      let paths = "";
      for (let i = 0; i < size; i++) {
        const a0 = (i / size) * Math.PI * 2 - Math.PI / 2;
        const a1 = ((i + 1) / size) * Math.PI * 2 - Math.PI / 2;
        const x0 = cx + r * Math.cos(a0), y0 = cy + r * Math.sin(a0);
        const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
        const largeArc = (a1 - a0) > Math.PI ? 1 : 0;
        const isFilled = i < filled;
        const fill = isFilled ? "var(--brass)" : "var(--bg-2)";
        const stroke = "var(--line-strong)";
        paths += `<path d="M ${cx} ${cy} L ${x0.toFixed(2)} ${y0.toFixed(2)} A ${r} ${r} 0 ${largeArc} 1 ${x1.toFixed(2)} ${y1.toFixed(2)} Z" fill="${fill}" stroke="${stroke}" stroke-width="1.2"/>`;
      }
      // outer ring
      paths += `<circle cx="${cx}" cy="${cy}" r="${r + 1}" fill="none" stroke="var(--brass-dim)" stroke-width="1"/>`;
      return `<svg class="clock-svg" viewBox="0 0 ${dim} ${dim}" width="${dim}" height="${dim}">${paths}</svg>`;
    }

    function renderClocks() {
      const list = $("#clocksList");
      if (!state.clocks.length) {
        list.innerHTML = `<div style="text-align:center;color:var(--ink-faint);font-family:'Special Elite',monospace;font-size:10px;letter-spacing:.2em;padding:6px 0">— no clocks —</div>`;
        return;
      }
      list.innerHTML = state.clocks.map(c => `
        <div class="clock-card" data-id="${c.id}">
          ${clockSVG(c.filled, c.size)}
          <div>
            <div class="clock-name" contenteditable="true" spellcheck="false" data-act="rename">${escapeHtml(c.name)}</div>
            <div class="clock-progress">${c.filled} / ${c.size}</div>
          </div>
          <div class="clock-controls">
            <button class="clock-btn" data-act="dec" title="Tick down">−</button>
            <button class="clock-btn" data-act="inc" title="Tick up">+</button>
            <button class="clock-btn danger" data-act="del" title="Delete">×</button>
          </div>
        </div>
      `).join('');
    }

    async function persistClocks() {
      if (!isInOR) return;
      try {
        await OBR.room.setMetadata({ [CLOCKS_KEY]: state.clocks });
      } catch (e) { console.warn("metadata save failed", e); }
    }

    function tickClock(id, delta) {
      const c = state.clocks.find(x => x.id === id);
      if (!c) return;
      c.filled = Math.max(0, Math.min(c.size, c.filled + delta));
      renderClocks();
      persistClocks();
    }
    function deleteClock(id) {
      state.clocks = state.clocks.filter(x => x.id !== id);
      renderClocks();
      persistClocks();
    }
    function renameClock(id, newName) {
      const c = state.clocks.find(x => x.id === id);
      if (!c) return;
      const trimmed = newName.trim().slice(0, 60) || "Untitled clock";
      if (c.name === trimmed) return;
      c.name = trimmed;
      persistClocks();
    }
    function createClock(name, size) {
      const c = {
        id: uid(),
        name: (name || "Untitled clock").trim().slice(0, 60),
        size,
        filled: 0
      };
      state.clocks.push(c);
      renderClocks();
      persistClocks();
    }

    // ─── escape helper ──────────────────────────────────────
    function escapeHtml(s) {
      return String(s ?? "")
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }

    // ─── UI wiring ──────────────────────────────────────────
    function setActive(container, value, attr = "data-d") {
      $$("button", container).forEach(b => {
        b.classList.toggle("active", b.getAttribute(attr) === String(value));
      });
    }

    // tabs
    $("#kindTabs").addEventListener("click", e => {
      const t = e.target.closest(".tab"); if (!t) return;
      state.kind = t.dataset.kind;
      $$("#kindTabs .tab").forEach(x => x.classList.toggle("active", x === t));
      $("#actionExtras").style.display = state.kind === "action" ? "" : "none";
    });

    // dice picker
    $("#dicePicker").addEventListener("click", e => {
      const p = e.target.closest(".pip"); if (!p) return;
      state.dice = parseInt(p.dataset.d, 10);
      setActive($("#dicePicker"), state.dice);
    });

    // position / effect
    $("#positionSeg").addEventListener("click", e => {
      const b = e.target.closest("button"); if (!b) return;
      state.position = b.dataset.v;
      setActive($("#positionSeg"), state.position, "data-v");
    });
    $("#effectSeg").addEventListener("click", e => {
      const b = e.target.closest("button"); if (!b) return;
      state.effect = b.dataset.v;
      setActive($("#effectSeg"), state.effect, "data-v");
    });

    // roll
    $("#rollBtn").addEventListener("click", doRoll);

    // clocks: list event delegation
    $("#clocksList").addEventListener("click", e => {
      const card = e.target.closest(".clock-card"); if (!card) return;
      const id = card.dataset.id;
      const act = e.target.dataset.act;
      if (act === "inc") tickClock(id, +1);
      else if (act === "dec") tickClock(id, -1);
      else if (act === "del") {
        if (confirm("Delete this clock?")) deleteClock(id);
      }
    });
    // rename on blur
    $("#clocksList").addEventListener("blur", e => {
      if (e.target.dataset.act !== "rename") return;
      const id = e.target.closest(".clock-card").dataset.id;
      renameClock(id, e.target.textContent);
    }, true);
    $("#clocksList").addEventListener("keydown", e => {
      if (e.target.dataset.act === "rename" && e.key === "Enter") {
        e.preventDefault(); e.target.blur();
      }
    });

    // new clock form
    const form = $("#newClockForm");
    $("#newClockBtn").addEventListener("click", () => {
      form.classList.add("open");
      $("#newClockName").focus();
    });
    $("#cancelClockBtn").addEventListener("click", () => {
      form.classList.remove("open");
      $("#newClockName").value = "";
    });
    $("#sizePicker").addEventListener("click", e => {
      const b = e.target.closest("button"); if (!b) return;
      state.newClockSize = parseInt(b.dataset.s, 10);
      $$("#sizePicker button").forEach(x => x.classList.toggle("active", x === b));
    });
    $("#createClockBtn").addEventListener("click", () => {
      const name = $("#newClockName").value;
      createClock(name, state.newClockSize);
      $("#newClockName").value = "";
      form.classList.remove("open");
    });
    $("#newClockName").addEventListener("keydown", e => {
      if (e.key === "Enter") $("#createClockBtn").click();
      if (e.key === "Escape") $("#cancelClockBtn").click();
    });

    // ─── OBR integration ────────────────────────────────────
    function applyRoomMetadata(meta) {
      const incoming = meta[CLOCKS_KEY];
      if (Array.isArray(incoming)) {
        state.clocks = incoming.map(c => ({
          id: c.id || uid(),
          name: String(c.name || "Untitled").slice(0, 60),
          size: [4, 6, 8, 12].includes(c.size) ? c.size : 6,
          filled: Math.max(0, Math.min(c.size || 6, c.filled || 0))
        }));
      } else {
        state.clocks = [];
      }
      renderClocks();
    }

    async function refreshIdentity() {
      try {
        state.me.name  = (await OBR.player.getName())  || "Player";
        state.me.color = (await OBR.player.getColor()) || "#d4a14a";
        state.me.role  = (await OBR.player.getRole())  || "PLAYER";
      } catch (e) {}
    }

    if (isInOR) {
      OBR.onReady(async () => {
        await refreshIdentity();

        // initial clocks
        try {
          const meta = await OBR.room.getMetadata();
          applyRoomMetadata(meta || {});
        } catch (e) { console.warn(e); }

        // sync clocks
        OBR.room.onMetadataChange(applyRoomMetadata);

        // remote rolls
        OBR.broadcast.onMessage(DICE_CHANNEL, ev => {
          const p = ev.data;
          if (!p || !p.result) return;
          renderLastRoll(p);   // show their roll in the spotlight too
          pushFeed(p);
        });
      });
    } else {
      $("#offlineWarn").style.display = "";
      renderClocks();   // show empty-state hint
    }
  </script>
</body>
</html>
